<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=0" />
		<title>Alimin`s Homepage</title>
		<script type="text/javascript" src="./jquery-3.6.0.min.js"></script>
		<script type="text/javascript" src="./showdown.min.js"></script>
		<script type="text/javascript" src="./template.js"></script>
		<style type="text/css">
		body {
			text-align: center;
		}
		.content-root {
			padding-left: 32px;
			padding-right: 32px;
			padding-top: 32px;
			text-align: left;
			margin:0 auto;
			width: 800px;
		}
		.title {
			font-family: '思源宋体 Heavy',serif;
			mso-ascii-font-family: 'Adobe Hebrew';
			mso-hansi-font-family:'Adobe Hebrew';
		}
		.title-1 {
			font-family: '思源宋体 Medium',serif;
			mso-ascii-font-family: 'Adobe Hebrew';
			mso-hansi-font-family:'Adobe Hebrew';
		}
		.title-1-120 {
			min-width:120;
			font-family: '思源宋体 Medium',serif;
			mso-ascii-font-family: 'Adobe Hebrew';
			mso-hansi-font-family:'Adobe Hebrew';
		}
		.title-1-160 {
			min-width:160;
			font-family: '思源宋体 Medium',serif;
			mso-ascii-font-family: 'Adobe Hebrew';
			mso-hansi-font-family:'Adobe Hebrew';
		}
		.content {
			color: #666666;
			font-family: '思源宋体 Medium',serif;
			mso-ascii-font-family: 'Adobe Hebrew';
			mso-hansi-font-family:'Adobe Hebrew';
		}
		.block-accent {
			padding-top: 16;
			padding-bottom: 4;
			padding-left: 6;
			padding-right: 6;
			margin-right: 8;
			background-color: #c82623;
			color: #ffffff;
		}
		.content-inside {
			padding-top: : 4;
			
		}
		.content-outside {
			padding-top: : 6;
			margin-bottom: 8;
		}
		.header {
			padding-top: 64px;
		}
		</style>
	</head>
	<body >
		<div id="content" class="content-root"></div>
		<script type="text/javascript" >
			function getQueryString(name) {
				var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)', 'i');
				var r = window.location.search.substr(1).match(reg);
				if (r != null) {
					return unescape(r[2]);
				}
				return null;
			}
			function loadPublicTemplate(templateStr) {
				$.get("./extra_alimin.md", function(text, status) {
					loadTemplate(templateStr + "\n" + text);
				});
			}
			function loadPrivateTemplate(templateStr) {
				$.get("./assets/default_red_honor.bin", function(text, status) {
					loadTemplate(templateStr + "\n" + text);
				});
			}
			function loadTemplate(templateStr) {
				$.get("./bin/alimin.json", function(json, status) {
					var converter = new showdown.Converter();
					var html = converter.makeHtml(template(templateStr, json));
					$('#content').html(html);
				}, "json");
			}
			$.get("./assets/default_red.bin", function( templateStr, status) {
				var privacy = getQueryString("privacy");
				console.log(privacy);
				if (privacy == "private") {
					loadPrivateTemplate(templateStr);
				} else {
					loadPublicTemplate(templateStr);
				}
			});
		</script>
	</body>
</html>
